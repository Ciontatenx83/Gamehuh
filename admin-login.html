<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Tariq Smile Game Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .login-header p {
            font-size: 16px;
            opacity: 0.95;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            margin: 0;
        }

        .login-body {
            padding: 40px;
        }

        /* Form groups */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
            display: block;
            font-size: 14px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .form-control {
            border: 2px solid #4a5568;
            background: #f7fafc;
            color: #2d3748;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .form-control:focus {
            border-color: #667eea;
            background: #ffffff;
            color: #2d3748;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }

        .form-control::placeholder {
            color: #718096;
            font-style: italic;
        }

        .form-control.error {
            border-color: #dc3545;
        }

        /* Password Input Container */
        .password-input-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-input-container .form-control {
            padding-right: 45px;
            width: 100%;
        }

        .password-toggle-btn {
            position: absolute;
            right: 10px;
            background: linear-gradient(135deg, #00d4ff 0%, #8b5cf6 100%);
            border: none;
            border-radius: 6px;
            color: white;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.3);
        }

        .password-toggle-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.5);
            background: linear-gradient(135deg, #00b8e6 0%, #7c3aed 100%);
        }

        .password-toggle-btn:active {
            transform: scale(0.95);
        }

        .password-toggle-btn i {
            transition: all 0.2s ease;
        }

        .password-toggle-btn:hover i {
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
        }

        /* Buttons */
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner-border {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Messages */
        .alert {
            border: none;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 20px;
            font-size: 14px;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-danger {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: #991b1b;
            border: 1px solid #fca5a5;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .alert-info {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            color: #1e40af;
            border: 1px solid #93c5fd;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .alert-success {
            background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%);
            color: #166534;
            border: 1px solid #86efac;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .info-text {
            font-size: 13px;
            color: #4b5563;
            text-align: center;
            margin-top: 15px;
            line-height: 1.5;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Header -->
        <div class="login-header">
            <h1><i class="fas fa-lock"></i> Admin Login</h1>
            <p>Enter your credentials to access the admin dashboard</p>
        </div>

        <!-- Body -->
        <div class="login-body">
            <!-- Alerts -->
            <div id="alertContainer"></div>

            <!-- Login Form -->
            <div class="form-group">
                <label class="form-label" for="adminEmail">Admin Email</label>
                <input type="email" class="form-control" id="adminEmail" placeholder="Enter admin email" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="adminPassword">Password</label>
                <div class="password-input-container">
                    <input type="password" class="form-control" id="adminPassword" placeholder="Enter password" required>
                    <button type="button" class="password-toggle-btn" onclick="togglePassword()" title="Show/Hide Password">
                        <i class="fas fa-eye" id="passwordToggleIcon"></i>
                    </button>
                </div>
            </div>

            <button class="btn-login" onclick="handleLogin()">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>

            <p class="info-text">
                <i class="fas fa-lock"></i> Your credentials are secure
            </p>
        </div>
    </div>

    <script>
        // ========================================
        // CONFIGURATION
        // ========================================
        const ADMIN_PASSWORD = 'Ciontatenx83';
        const MAX_ATTEMPTS = 4;
        const LOCKOUT_DURATION = 12 * 60 * 60 * 1000; // 12 hours in milliseconds
        const STORAGE_KEYS = {
            attempts: 'adminLoginAttempts',
            lockoutTime: 'adminLockoutTime'
        };

        // ========================================
        // STATE MANAGEMENT
        // ========================================
        let appState = {
            email: '',
            password: '',
            adminToken: ''
        };

        // ========================================
        // ALERT MANAGEMENT
        // ========================================
        function showAlert(message, type = 'danger') {
            const alertContainer = document.getElementById('alertContainer');
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${type === 'success' ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-exclamation-circle"></i>'}
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            alertContainer.innerHTML = alertHtml;

            // Auto-dismiss success alerts
            if (type === 'success') {
                setTimeout(() => {
                    alertContainer.innerHTML = '';
                }, 2000);
            }
        }

        // ========================================
        // LOCKOUT MANAGEMENT
        // ========================================
        function isAccountLocked() {
            const lockoutTime = localStorage.getItem(STORAGE_KEYS.lockoutTime);
            if (!lockoutTime) return false;

            const lockoutExpiry = parseInt(lockoutTime);
            const now = Date.now();

            if (now < lockoutExpiry) {
                return true; // Still locked
            } else {
                // Lockout expired, clear it
                localStorage.removeItem(STORAGE_KEYS.lockoutTime);
                localStorage.removeItem(STORAGE_KEYS.attempts);
                return false;
            }
        }

        function getLockoutTimeRemaining() {
            const lockoutTime = localStorage.getItem(STORAGE_KEYS.lockoutTime);
            if (!lockoutTime) return 0;

            const lockoutExpiry = parseInt(lockoutTime);
            const now = Date.now();
            const remaining = Math.max(0, lockoutExpiry - now);
            return remaining;
        }

        function formatTimeRemaining(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            if (hours > 0) {
                return `${hours}h ${minutes}m ${seconds}s`;
            } else if (minutes > 0) {
                return `${minutes}m ${seconds}s`;
            } else {
                return `${seconds}s`;
            }
        }

        function lockAccount() {
            const lockoutExpiry = Date.now() + LOCKOUT_DURATION;
            localStorage.setItem(STORAGE_KEYS.lockoutTime, lockoutExpiry.toString());
        }

        function getFailedAttempts() {
            const attempts = localStorage.getItem(STORAGE_KEYS.attempts);
            return attempts ? parseInt(attempts) : 0;
        }

        function incrementFailedAttempts() {
            const currentAttempts = getFailedAttempts();
            const newAttempts = currentAttempts + 1;
            localStorage.setItem(STORAGE_KEYS.attempts, newAttempts.toString());
            return newAttempts;
        }

        function clearFailedAttempts() {
            localStorage.removeItem(STORAGE_KEYS.attempts);
        }

        // ========================================
        // LOGIN HANDLER
        // ========================================
        async function handleLogin() {
            // Check if account is locked
            if (isAccountLocked()) {
                const remaining = getLockoutTimeRemaining();
                const timeStr = formatTimeRemaining(remaining);
                showAlert(`Account is locked. Try again in ${timeStr}`, 'danger');
                return;
            }

            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;

            // Validation
            if (!email || !password) {
                showAlert('Please fill in all fields', 'danger');
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showAlert('Please enter a valid email address', 'danger');
                return;
            }

            // Check password
            if (password !== ADMIN_PASSWORD) {
                const attempts = incrementFailedAttempts();
                const remaining = MAX_ATTEMPTS - attempts;

                if (attempts >= MAX_ATTEMPTS) {
                    lockAccount();
                    const timeStr = formatTimeRemaining(LOCKOUT_DURATION);
                    showAlert(`❌ Too many failed attempts. Account locked for ${timeStr}`, 'danger');
                } else if (remaining === 1) {
                    showAlert(`❌ Invalid password. ${remaining} attempt remaining before lockout`, 'danger');
                } else {
                    showAlert(`❌ Invalid password. ${remaining} attempts remaining before lockout`, 'danger');
                }
                return;
            }

            // Password is correct
            // Disable button
            const button = event.target;
            const originalText = button.innerHTML;
            button.disabled = true;
            button.innerHTML = '<span class="spinner-border"></span> Logging in...';

            try {
                // Clear failed attempts on successful login
                clearFailedAttempts();

                // Store admin info
                appState.adminToken = 'admin-token-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('adminToken', appState.adminToken);
                localStorage.setItem('adminEmail', email);

                // Show success message
                showAlert('✅ Login successful! Redirecting...', 'success');
                
                // Redirect to admin dashboard
                setTimeout(() => {
                    window.location.href = '/admin.html';
                }, 1000);

            } catch (error) {
                console.error('Error:', error);
                showAlert('An error occurred. Please try again.', 'danger');
                button.disabled = false;
                button.innerHTML = originalText;
            }
        }

        // ========================================
        // NAVIGATION
        // ========================================
        function goToAdminDashboard() {
            window.location.href = '/admin.html';
        }

        // ========================================
        // PASSWORD VISIBILITY TOGGLE
        // ========================================
        function togglePassword() {
            const passwordInput = document.getElementById('adminPassword');
            const toggleIcon = document.getElementById('passwordToggleIcon');
            const toggleBtn = document.querySelector('.password-toggle-btn');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
                toggleBtn.title = 'Hide Password';
                toggleBtn.style.background = 'linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%)';
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
                toggleBtn.title = 'Show Password';
                toggleBtn.style.background = 'linear-gradient(135deg, #00d4ff 0%, #8b5cf6 100%)';
            }
        }

        // ========================================
        // INIT
        // ========================================
        document.addEventListener('DOMContentLoaded', function () {
            // Check if already authenticated
            const token = localStorage.getItem('adminToken');
            if (token) {
                window.location.href = '/admin.html';
            }

            // Allow Enter key to submit form
            document.getElementById('adminPassword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    handleLogin();
                }
            });

            // Check if account is locked and show message
            if (isAccountLocked()) {
                const remaining = getLockoutTimeRemaining();
                const timeStr = formatTimeRemaining(remaining);
                showAlert(`Account is locked. Try again in ${timeStr}`, 'danger');
                document.getElementById('adminEmail').disabled = true;
                document.getElementById('adminPassword').disabled = true;
                document.querySelector('.btn-login').disabled = true;

                // Update lockout message every second
                setInterval(() => {
                    if (isAccountLocked()) {
                        const remaining = getLockoutTimeRemaining();
                        const timeStr = formatTimeRemaining(remaining);
                        showAlert(`Account is locked. Try again in ${timeStr}`, 'danger');
                    } else {
                        // Lockout expired, refresh the page
                        location.reload();
                    }
                }, 1000);
            }
        });
    </script>
</body>
</html>
